{% extends "forum_app/base.html" %}

{% block content %}
<div class="central-content-box">
    <div class="central-content">
        {% if category %}
            <h1 class="text-primary">{{ category.name }}</h1>
            <p>Welcome to the {{ category.name }} forums! Posts will appear here soon.</p>
        {% else %}
            <h1 class="text-danger">Category Not Found</h1>
            <p>The category you are looking for does not exist.</p>
        {% endif %}
    </div>
</div>
{% endblock %}
