<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
    <h1>🔑 Login to Forums</h1>

    {% if error_msg %}
        <p style="color: red; font-weight: bold;">{{ error_msg }}</p>
    {% endif %}

    <form method="post" action="{% url 'forum_app:login' %}">
        {% csrf_token %}
        Username: <input type="text" name="username" value="" size="50" /><br /><br />
        Password: <input type="password" name="password" value="" size="50" /><br /><br />
        <input type="submit" value="Login" />
    </form>

    <br>
    <p>Don't have an account? <a href="{% url 'forum_app:register' %}">Register here</a></p>
</body>
</html>
